# Site
title: BlueOfflaner Blog
subtitle: 记录技术、产品与生活
description: 一个基于 Hexo 构建的个人博客。
keywords:
  - Hexo
  - Blog
  - 技术
author: BlueOfflaner
language: zh-CN
timezone: America/Los_Angeles

# URL
url: https://blueofflaner.github.io/blog
root: /blog/
permalink: posts/:year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: false
  line_number: true
  tab_replace: ''

# Home page
index_generator:
  path: ''
  per_page: 8
  order_by: -date

# Category & Tag
default_category: 随笔
category_map:
tag_map:

# Metadata
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude
include:
exclude:
ignore:

# Theme
theme: butterfly

# Deployment
deploy:
  type: git
  repo: https://github.com/BlueOfflaner/blog.git
  branch: gh-pages

# Search plugin
search:
  path: search.xml
  field: post
  content: true
  format: html
  limit: 10000

# SEO plugins
sitemap:
  path:
    - sitemap.xml

feed:
  type: atom
  path: atom.xml
  limit: 20
